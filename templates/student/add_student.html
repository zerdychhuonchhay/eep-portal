{% extends "layout.html" %}

{% block title %}Enroll New Student{% endblock %}

{% block main %}
<div class="container-fluid container-md mt-3 mt-md-4 mb-5 px-0 px-md-3" style="max-width: 1200px;">
    
    <!-- NATIVE iOS/ANDROID STYLE HEADER -->
    <div class="mb-4 px-3 px-md-0 d-flex justify-content-between align-items-center">
        <a href="/roster" class="text-decoration-none fw-bold d-inline-flex align-items-center transition-hover" style="color: #007AFF; font-size: 1.05rem;">
            <i class="bi bi-chevron-left fs-5 me-1" style="margin-left: -5px; margin-top: -2px;"></i> Cancel
        </a>
        <h5 class="fw-bold mb-0 text-dark d-none d-md-block">New Enrollment</h5>
        <button type="submit" form="addStudentForm" class="btn btn-primary fw-bold rounded-pill px-4 shadow-sm transition-hover d-none d-md-block">Enroll Student</button>
    </div>

    <form id="addStudentForm" action="/add_student" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
        <div class="row g-4">
            
            <!-- LEFT COLUMN: PHOTO & STATUS -->
            <div class="col-12 col-lg-4">
                <div class="sticky-lg-top" style="top: 80px; z-index: 5;">
                    <div class="card shadow-sm border-0 rounded-4 native-card text-center mb-4 bg-white pt-5 pb-4">
                        <div class="card-body px-4">
                            <div class="mb-4">
                                <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center border border-2 border-dashed border-secondary border-opacity-25" style="width: 130px; height: 130px;">
                                    <i class="bi bi-person-bounding-box text-muted opacity-25" style="font-size: 4rem;"></i>
                                </div>
                            </div>
                            <h5 class="fw-bold mb-3">Student Photo</h5>
                            <input type="file" name="profile_picture" class="form-control form-control-sm rounded-pill mb-2" accept="image/*">
                            <p class="text-muted small mb-0">Optional. Can be uploaded later.</p>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0 rounded-4 mb-4 native-card bg-white overflow-hidden">
                        <div class="list-group list-group-flush">
                            <div class="list-group-item py-3 bg-white">
                                <label class="form-label fw-bold small text-muted text-uppercase d-block" style="font-size: 0.6rem;">Joined Date</label>
                                <input class="form-control border-0 bg-light fw-bold" name="joined_date" type="date" value="{{ today_date }}">
                            </div>
                            <div class="list-group-item py-3 bg-white border-bottom-0">
                                <label class="form-label fw-bold small text-muted text-uppercase d-block" style="font-size: 0.6rem;">Nutrition Plan</label>
                                <select class="form-select border-0 bg-light fw-bold" name="meal_plan">
                                    <option value="None" selected>No Meals Assigned</option>
                                    <option value="Daily Hot Lunch">Daily Hot Lunch</option>
                                    <option value="Monthly Groceries">Monthly Groceries</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: INTAKE DATA -->
            <div class="col-12 col-lg-8">
                
                <!-- 1. CORE IDENTITY -->
                <div class="card shadow-sm border-0 rounded-4 mb-4 native-card bg-white">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4 rounded-top-4">
                        <h5 class="fw-bold text-dark mb-0"><i class="bi bi-person-vcard-fill me-2 text-primary"></i>Core Identification</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-bold small text-muted text-uppercase">NGO ID *</label>
                                <input class="form-control bg-light border-primary border-opacity-25 fw-bold p-2 font-monospace text-primary" name="ngo_id" type="text" placeholder="e.g. EEB24001" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">First Name (EN) *</label>
                                <input class="form-control bg-light border-0 fw-bold p-2" name="first_name" type="text" placeholder="GIVEN NAME" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Last Name (EN) *</label>
                                <input class="form-control bg-light border-0 fw-bold p-2" name="last_name" type="text" placeholder="FAMILY NAME" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Khmer Name</label>
                                <input class="form-control bg-light border-0 khmer-font p-2" name="khmer_name" type="text">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-muted text-uppercase">Gender *</label>
                                <select class="form-select bg-light border-0 fw-bold" name="gender" required>
                                    <option disabled selected value="">Select...</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-muted text-uppercase">Date of Birth</label>
                                <input class="form-control bg-light border-0 fw-bold" name="dob" type="date">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. FAMILY & HOUSEHOLD LINK -->
                <div class="card shadow-sm border-0 rounded-4 mb-4 native-card bg-white border-start border-info border-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4 rounded-top-4">
                        <h5 class="fw-bold text-dark mb-0"><i class="bi bi-house-heart-fill me-2 text-info"></i>Household & Kinship</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="p-3 bg-info bg-opacity-10 border border-info border-opacity-25 rounded-4 mb-4">
                            <label class="form-label fw-bold small text-info-emphasis text-uppercase" for="householdSelect"><i class="bi bi-link-45deg me-1"></i>Link to Existing Family File</label>
                            <select class="form-select border-info border-opacity-50 fw-bold shadow-sm" name="household_id" id="householdSelect" onchange="syncHouseholdData()">
                                <option value="" selected>➕ CREATE NEW (Type individual family data below)</option>
                                {% for hh in households %}
                                    <option value="{{ hh.id }}" 
                                            data-guardian="{{ hh.guardian_name }}"
                                            data-phone="{{ hh.phone_number }}"
                                            data-slum="{{ hh.slum_area }}">
                                        {{ hh.household_income if hh.household_income else '#' ~ hh.id }} — {{ hh.guardian_name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Mother's Name</label>
                                <input class="form-control bg-light border-0 khmer-font p-2" name="mother_name" type="text" placeholder="As per Birth Cert">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Father's Name</label>
                                <input class="form-control bg-light border-0 khmer-font p-2" name="father_name" type="text" placeholder="As per Birth Cert">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Relation to Guardian</label>
                                <input class="form-control bg-light border-0 fw-bold p-2" name="caregiver_relationship" type="text" placeholder="e.g. Living with Grandmother">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Address / Village</label>
                                <input class="form-control bg-light border-0 khmer-font p-2" id="slum_area" name="slum_area" type="text">
                            </div>
                        </div>

                        <!-- Sync/Legacy Fields -->
                        <div class="row g-3 mt-1">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Guardian Name</label>
                                <input class="form-control border-0 p-2 text-muted fw-bold" id="guardian_name" name="guardian_name" type="text">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Contact Phone</label>
                                <input class="form-control border-0 p-2 text-muted fw-bold" id="phone_number" name="phone_number" type="text">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3. EDUCATION -->
                <div class="card shadow-sm border-0 rounded-4 mb-4 native-card bg-white">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4 rounded-top-4">
                        <h5 class="fw-bold text-dark mb-0"><i class="bi bi-mortarboard-fill me-2 text-success"></i>School Enrollment</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Current School</label>
                                <input class="form-control bg-light border-0 khmer-font p-2" name="current_school" type="text">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Grade Level *</label>
                                <select class="form-select bg-light border-0 fw-bold" name="grade_level" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option value="Kindergarten">Kindergarten</option>
                                    {% for i in range(1, 13) %}
                                    <option value="Grade {{ i }}">Grade {{ i }}</option>
                                    {% endfor %}
                                    <option value="Vocational">Vocational</option>
                                    <option value="University">University</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-bold small text-muted text-uppercase">Previous School History</label>
                                <input class="form-control bg-light border-0 khmer-font p-2" name="previous_school" type="text" placeholder="Where did they study before?">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 4. STAFF NARRATIVE -->
                <div class="card shadow-sm border-0 rounded-4 mb-5 native-card bg-white">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4 rounded-top-4">
                        <h5 class="fw-bold text-dark mb-0"><i class="bi bi-chat-left-text-fill me-2 text-secondary"></i>Staff Remarks</h5>
                    </div>
                    <div class="card-body p-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Initial Intake Comments</label>
                        <textarea class="form-control bg-light border-0 khmer-font p-3" name="comment" rows="5" placeholder="Family background, medical notes, or housing situation..."></textarea>
                    </div>
                </div>

                <!-- Mobile Action -->
                <div class="d-md-none mb-5">
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 rounded-pill shadow-lg">Register & Enroll</button>
                </div>

            </div>
        </div>
    </form>
</div>

<style>
    .avatar-xl { width: 130px; height: 130px; object-fit: cover; }
    .transition-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .transition-hover:hover { transform: translateY(-2px); }
    @media (max-width: 767.98px) { .native-card { border-radius: 0 !important; border-left: 0 !important; border-right: 0 !important; margin-left: -1rem; margin-right: -1rem; } }
</style>
{% endblock %}

{% block scripts %}
<script>
    function syncHouseholdData() {
        const select = document.getElementById("householdSelect");
        const selected = select.options[select.selectedIndex];
        const gName = document.getElementById("guardian_name");
        const pNum = document.getElementById("phone_number");
        const sArea = document.getElementById("slum_area");

        if (select.value === "") {
            gName.readOnly = false; pNum.readOnly = false; sArea.readOnly = false;
            gName.classList.remove("bg-light", "text-muted");
            pNum.classList.remove("bg-light", "text-muted");
            sArea.classList.remove("bg-light", "text-muted");
        } else {
            gName.value = selected.getAttribute("data-guardian") || "";
            pNum.value = selected.getAttribute("data-phone") || "";
            sArea.value = selected.getAttribute("data-slum") || "";
            gName.readOnly = true; pNum.readOnly = true; sArea.readOnly = true;
            gName.classList.add("bg-light", "text-muted");
            pNum.classList.add("bg-light", "text-muted");
            sArea.classList.add("bg-light", "text-muted");
        }
    }
    document.addEventListener("DOMContentLoaded", syncHouseholdData);
</script>
{% endblock %}
