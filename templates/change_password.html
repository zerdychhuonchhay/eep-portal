{% extends "layout.html" %}

{% block title %}
    Change Password
{% endblock %}

{% block main %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 rounded-4 border-top border-warning border-4" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            
            <div class="text-center mb-4">
                <div class="d-inline-block bg-warning bg-opacity-10 p-3 rounded-circle mb-3">
                    <i class="bi bi-key-fill text-warning" style="font-size: 2.5rem;"></i>
                </div>
                <h3 class="fw-bold text-dark">Change Password</h3>
                <p class="text-muted small">Secure your EEP Portal account.</p>
            </div>

            <form action="/change_password" method="post">
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Current Password</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-unlock-fill"></i></span>
                        <input autocomplete="off" autofocus class="form-control border-start-0 py-2 bg-light" name="old_password" type="password" required>
                    </div>
                </div>

                <hr class="text-muted opacity-25 mb-4">

                <div class="mb-3">
                    <label class="form-label small fw-bold text-primary">New Password</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-primary"><i class="bi bi-shield-lock-fill"></i></span>
                        <input class="form-control border-start-0 border-primary py-2 bg-white" name="new_password" type="password" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-primary">Confirm New Password</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-primary"><i class="bi bi-check-circle-fill"></i></span>
                        <input class="form-control border-start-0 border-primary py-2 bg-white" name="confirmation" type="password" required>
                    </div>
                </div>

                <button class="btn btn-warning btn-lg w-100 fw-bold shadow-sm mb-3" type="submit">
                    Update Password <i class="bi bi-arrow-right-short ms-1"></i>
                </button>

            </form>

            <div class="text-center mt-3 pt-3 border-top">
                <p class="text-muted small mb-0">
                    <a href="/" class="text-secondary text-decoration-none fw-bold"><i class="bi bi-arrow-left"></i> Cancel and Return to Roster</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
