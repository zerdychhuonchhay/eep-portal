{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 420px;">
        <div class="card-body p-5">
            
            <!-- Branding / Icon -->
            <div class="text-center mb-4">
                <div class="d-inline-block bg-success bg-opacity-10 p-3 rounded-circle mb-3">
                    <i class="bi bi-shield-lock-fill text-success" style="font-size: 2.5rem;"></i>
                </div>
                <h3 class="fw-bold text-dark">Staff Portal</h3>
                <p class="text-muted small">Please sign in to access student records.</p>
            </div>

            <!-- Login Form -->
            <form action="/login" method="post">
                
                <!-- Username Input with Icon -->
                <div class="input-group mb-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-person-fill"></i>
                    </span>
                    <input autocomplete="off" autofocus class="form-control border-start-0 py-2 bg-white" name="username" placeholder="Username" type="text" required>
                </div>

                <!-- Password Input with Icon -->
                <div class="input-group mb-4 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-key-fill"></i>
                    </span>
                    <input class="form-control border-start-0 py-2 bg-white" name="password" placeholder="Password" type="password" required>
                </div>

                <!-- Submit Button -->
                <button class="btn btn-success btn-lg w-100 fw-bold shadow-sm mb-3" type="submit">
                    Secure Log In <i class="bi bi-arrow-right-short ms-1"></i>
                </button>

            </form>

            <!-- Public Registration Link (Connects to the Pending Approval workflow!) -->
            <div class="text-center mt-3 pt-3 border-top">
                <p class="text-muted small mb-0">Don't have an account? 
                    <a href="/register" class="text-success fw-bold text-decoration-none">Sign up for access</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
