{% extends "layout.html" %}

{% block title %}Sign Up{% endblock %}

{% block main %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow-lg border-0 rounded-4 border-top border-info border-4" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            
            <div class="text-center mb-4">
                <div class="d-inline-block bg-info bg-opacity-10 p-3 rounded-circle mb-3">
                    <i class="bi bi-person-vcard-fill text-info" style="font-size: 2.5rem;"></i>
                </div>
                <h3 class="fw-bold text-dark">Staff Sign Up</h3>
                <p class="text-muted small">Create your account. An administrator must approve it before you can log in.</p>
            </div>

            <form action="/register" method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Choose Username</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person-fill"></i></span>
                        <input autocomplete="off" autofocus class="form-control border-start-0 py-2 bg-light" name="username" placeholder="e.g. Sreynuch" type="text" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Create Password</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
                        <input class="form-control border-start-0 py-2 bg-light" name="password" placeholder="Password" type="password" required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-check-circle-fill"></i></span>
                        <input class="form-control border-start-0 py-2 bg-light" name="confirmation" placeholder="Confirm Password" type="password" required>
                    </div>
                </div>

                <button class="btn btn-info btn-lg w-100 fw-bold shadow-sm mb-3 text-white" type="submit">
                    Submit Request <i class="bi bi-send-fill ms-1"></i>
                </button>
            </form>

            <div class="text-center mt-3 pt-3 border-top">
                <p class="text-muted small mb-0">Already approved? 
                    <a href="/login" class="text-info fw-bold text-decoration-none">Log In Here</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
