{% extends "layout.html" %}

{% block title %}
    Add Student
{% endblock %}

{% block main %}
    <h2 class="mb-4">Register New Student</h2>
    
    <div class="card shadow-sm mx-auto" style="max-width: 800px;">
        <div class="card-body text-start">
            <form action="/add_student" method="post">
                
                <h5 class="text-primary border-bottom pb-2 mb-3">1. Student Details</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">NGO ID (e.g., EEB19027)</label>
                        <input autocomplete="off" class="form-control" name="ngo_id" type="text" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status">
                            <option value="Active" selected>Active</option>
                            <option value="Dropped Out">Dropped Out</option>
                            <option value="Graduated">Graduated</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">First Name</label>
                        <input class="form-control" name="first_name" type="text" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Last Name</label>
                        <input class="form-control" name="last_name" type="text" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Khmer Name</label>
                        <input class="form-control" name="khmer_name" type="text">
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender">
                            <option disabled selected value="">Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Date of Birth</label>
                        <input class="form-control" name="dob" type="date">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Joined Date</label>
                        <input class="form-control" name="joined_date" type="date">
                    </div>
                </div>

                <h5 class="text-primary border-bottom pb-2 mb-3">2. Family & School Info</h5>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Guardian Name</label>
                        <input class="form-control" name="guardian_name" type="text">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Phone Number</label>
                        <input class="form-control" name="phone_number" type="text">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Slum Area</label>
                        <input class="form-control" name="slum_area" type="text" placeholder="e.g., Steung Meanchey">
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Current School</label>
                        <input class="form-control" name="current_school" type="text">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Grade Level</label>
                        <input class="form-control" name="grade_level" type="text" placeholder="e.g., Grade 3">
                    </div>
                </div>

                <h5 class="text-primary border-bottom pb-2 mb-3">3. Additional Notes</h5>
                <div class="row mb-4">
                    <div class="col-12">
                        <label class="form-label">General Comments</label>
                        <textarea class="form-control" name="comment" rows="3" placeholder="Any special notes about this student..."></textarea>
                    </div>
                </div>

                <div class="text-center">
                    <button class="btn btn-success btn-lg px-5" type="submit">Save Student</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
