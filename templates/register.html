{% extends "layout.html" %}

{% block title %}
    Register Staff
{% endblock %}

{% block main %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">

            <!-- Branding / Icon -->
            <div class="text-center mb-4">
                <div class="d-inline-block bg-primary bg-opacity-10 p-3 rounded-circle mb-3">
                    <i class="bi bi-person-badge-fill text-primary" style="font-size: 2.5rem;"></i>
                </div>
                <h3 class="fw-bold text-dark">Register Staff</h3>
                <p class="text-muted small">Create a new account for an EEP team member.</p>
            </div>

            <!-- Registration Form -->
            <form action="/register" method="post">

                <!-- Username Input -->
                <div class="input-group mb-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-person-fill"></i>
                    </span>
                    <input autocomplete="off" autofocus class="form-control border-start-0 py-2 bg-white" name="username" placeholder="Username" type="text" required>
                </div>

                <!-- Role Selection Dropdown -->
                <div class="input-group mb-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-briefcase-fill"></i>
                    </span>
                    <select class="form-select border-start-0 py-2 bg-white text-muted" name="role" required>
                        <option value="" disabled selected>Select Staff Role...</option>
                        <option value="Social Worker">Social Worker</option>
                        <option value="Teacher">Teacher / Educator</option>
                        <option value="Admin">System Administrator</option>
                        <option value="Director">NGO Director</option>
                    </select>
                </div>

                <!-- Password Input -->
                <div class="input-group mb-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-key-fill"></i>
                    </span>
                    <input class="form-control border-start-0 py-2 bg-white" name="password" placeholder="Password" type="password" required>
                </div>

                <!-- Confirm Password Input -->
                <div class="input-group mb-4 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="bi bi-check-circle-fill"></i>
                    </span>
                    <input class="form-control border-start-0 py-2 bg-white" name="confirmation" placeholder="Confirm Password" type="password" required>
                </div>

                <!-- Submit Button -->
                <button class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mb-3" type="submit">
                    Create Account <i class="bi bi-person-plus-fill ms-1"></i>
                </button>

            </form>

            <!-- Link back to Login -->
            <div class="text-center mt-3 pt-3 border-top">
                <p class="text-muted small mb-0">Already have an account?
                    <a href="/login" class="text-primary text-decoration-none fw-bold">Log in here</a>
                </p>
            </div>

        </div>
    </div>
</div>
{% endblock %}
